<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Horienvideo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
    --bg:#060B18;
    --bg-soft:#0B1428;
    --surface:rgba(255,255,255,.045);
    --surface-hover:rgba(255,255,255,.08);
    --border:rgba(255,255,255,.09);
    --primary:#2E7CF6;
    --cyan:#22D3EE;
    --violet:#8B7CF6;
    --coral:#FF5470;
    --text:#EAF1FF;
    --text-dim:#8CA0C4;
    --radius:16px;
}
*{box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{
    font-family:'Inter',Arial,sans-serif;
    margin:0;
    padding:0;
    background:var(--bg);
    color:var(--text);
    min-height:100vh;
    position:relative;
    overflow-x:hidden;
}
body::before{
    content:"";
    position:fixed;
    top:-20%;
    left:50%;
    transform:translateX(-50%);
    width:1100px;
    height:700px;
    background:
        radial-gradient(circle at 30% 30%, rgba(46,124,246,.35), transparent 60%),
        radial-gradient(circle at 70% 40%, rgba(139,124,246,.25), transparent 55%),
        radial-gradient(circle at 50% 70%, rgba(34,211,238,.18), transparent 60%);
    filter:blur(40px);
    pointer-events:none;
    z-index:0;
}
h1,h2{font-family:'Space Grotesk',sans-serif;}

header{
    position:relative;
    z-index:1;
    padding:36px 20px 34px;
    text-align:center;
}
.logo-row{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:12px;
    margin-bottom:26px;
    cursor:pointer;
    width:fit-content;
    margin-left:auto;
    margin-right:auto;
}
.logo-mark{
    width:38px;
    height:38px;
    border-radius:11px;
    background:linear-gradient(135deg,var(--primary),var(--violet));
    display:flex;
    align-items:center;
    justify-content:center;
    box-shadow:0 0 24px rgba(46,124,246,.55);
}
.logo-mark svg{width:16px;height:16px;fill:#fff;}
header h1{
    margin:0;
    font-size:28px;
    font-weight:700;
    letter-spacing:-.02em;
    color:var(--text);
}
header h1 span{
    background:linear-gradient(90deg,var(--cyan),var(--primary));
    -webkit-background-clip:text;
    background-clip:text;
    color:transparent;
}
.search-box{
    display:flex;
    justify-content:center;
    gap:10px;
    flex-wrap:wrap;
}
.search-wrap{
    position:relative;
    width:440px;
    max-width:72vw;
}
.search-wrap svg{
    position:absolute;
    left:16px;
    top:50%;
    transform:translateY(-50%);
    width:17px;
    height:17px;
    stroke:var(--text-dim);
    pointer-events:none;
}
input{
    width:100%;
    padding:13px 16px 13px 42px;
    font-size:15px;
    border:1px solid var(--border);
    border-radius:999px;
    outline:none;
    background:var(--surface);
    color:var(--text);
    font-family:'Inter',sans-serif;
    transition:.2s;
}
input::placeholder{color:var(--text-dim);}
input:focus{
    border-color:var(--primary);
    box-shadow:0 0 0 4px rgba(46,124,246,.2);
    background:var(--surface-hover);
}
button{
    padding:13px 26px;
    background:linear-gradient(90deg,var(--primary),var(--violet));
    color:#fff;
    border:none;
    cursor:pointer;
    border-radius:999px;
    font-size:14px;
    font-weight:600;
    font-family:'Inter',sans-serif;
    transition:.2s;
    box-shadow:0 4px 18px rgba(46,124,246,.35);
}
button:hover{
    filter:brightness(1.12);
    transform:translateY(-1px);
    box-shadow:0 6px 22px rgba(46,124,246,.5);
}

main{
    position:relative;
    z-index:1;
    max-width:1300px;
    margin:0 auto;
    padding:10px 24px 70px;
}
#player-container{
    display:none;
    width:100%;
    max-width:920px;
    margin:0 auto 34px;
    aspect-ratio:16/9;
    border-radius:18px;
    overflow:hidden;
    border:1px solid var(--border);
    box-shadow:0 20px 60px rgba(0,0,0,.5), 0 0 0 1px rgba(46,124,246,.1);
}
#player-container iframe{
    width:100%;
    height:100%;
    border:0;
}

.section-title{
    display:flex;
    align-items:center;
    gap:10px;
    margin:34px 0 18px;
    font-size:19px;
    font-weight:600;
    color:var(--text);
}
.section-title .dot{
    width:9px;
    height:9px;
    border-radius:50%;
    background:linear-gradient(135deg,var(--primary),var(--cyan));
    box-shadow:0 0 10px rgba(46,124,246,.8);
}
.section-title.shorts .dot{
    background:linear-gradient(135deg,var(--violet),var(--coral));
    box-shadow:0 0 10px rgba(139,124,246,.8);
}

#results, #shorts-results, #trending-results{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
    gap:18px;
}
#shorts-results{
    grid-template-columns:repeat(auto-fill,minmax(165px,1fr));
}

.card{
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:var(--radius);
    overflow:hidden;
    cursor:pointer;
    position:relative;
    transition:.25s ease;
    backdrop-filter:blur(6px);
}
.card:hover{
    transform:translateY(-5px);
    border-color:rgba(46,124,246,.5);
    background:var(--surface-hover);
    box-shadow:0 14px 34px rgba(0,0,0,.4), 0 0 0 1px rgba(46,124,246,.25);
}
.thumb-wrap{
    position:relative;
    overflow:hidden;
}
.card img{
    width:100%;
    display:block;
    background:var(--bg-soft);
    transition:.3s ease;
}
.card.short img{
    aspect-ratio:9/16;
    object-fit:cover;
}
.card:hover img{transform:scale(1.05);}
.play-overlay{
    position:absolute;
    inset:0;
    display:flex;
    align-items:center;
    justify-content:center;
    opacity:0;
    transition:.2s;
    background:linear-gradient(180deg,rgba(6,11,24,0) 40%,rgba(6,11,24,.75));
}
.card:hover .play-overlay{opacity:1;}
.play-overlay svg{
    width:42px;
    height:42px;
    filter:drop-shadow(0 4px 12px rgba(0,0,0,.5));
}
.badge{
    position:absolute;
    top:9px;
    left:9px;
    z-index:2;
    background:linear-gradient(90deg,var(--violet),var(--coral));
    color:#fff;
    font-size:10px;
    font-weight:700;
    padding:4px 9px;
    border-radius:999px;
    letter-spacing:.6px;
}
.info{
    padding:12px 13px 14px;
}
.title{
    font-size:14px;
    font-weight:600;
    line-height:1.35;
    color:var(--text);
    display:-webkit-box;
    -webkit-line-clamp:2;
    -webkit-box-orient:vertical;
    overflow:hidden;
}
.channel{
    font-size:12px;
    color:var(--text-dim);
    margin-top:7px;
}
.state-msg{
    grid-column:1/-1;
    text-align:center;
    color:var(--text-dim);
    padding:26px;
}
@media(max-width:600px){
    header h1{font-size:23px;}
}
</style>
</head>
<body>
<header>
    <div class="logo-row" onclick="goHome()">
        <div class="logo-mark">
            <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
        </div>
        <h1>Horien<span>video</span></h1>
    </div>
    <div class="search-box">
        <div class="search-wrap">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <input
                type="text"
                id="query"
                placeholder="Search Horienvideo..."
                onkeypress="if(event.key==='Enter')searchVideos()">
        </div>
        <button onclick="searchVideos()">Search</button>
    </div>
</header>

<main>
    <div id="player-container">
        <iframe id="player" allowfullscreen></iframe>
    </div>

    <div id="search-section" style="display:none;">
        <div class="section-title"><div class="dot"></div>Search Results</div>
        <div id="results"></div>
    </div>

    <div id="home-section">
        <div class="section-title"><div class="dot"></div>Trending Videos</div>
        <div id="trending-results"><div class="state-msg">Loading trending videos...</div></div>

        <div class="section-title shorts"><div class="dot"></div>Trending Shorts</div>
        <div id="shorts-results"><div class="state-msg">Loading trending shorts...</div></div>
    </div>
</main>

<script>
// ===============================
// PUT YOUR API KEY HERE
// ===============================
const API_KEY = "AIzaSyDgir7W26YD_PaZjbxU2iWYTZhW4Vf_n84";
// ===============================
const REGION_CODE = "US";

const PLAY_ICON = `<svg viewBox="0 0 24 24" fill="#fff"><circle cx="12" cy="12" r="12" fill="rgba(255,255,255,.15)"/><path d="M9.5 7.5v9l8-4.5z"/></svg>`;

function parseDurationToSeconds(iso){
    const match = iso.match(/PT(\d+H)?(\d+M)?(\d+S)?/);
    const h = match[1] ? parseInt(match[1]) : 0;
    const m = match[2] ? parseInt(match[2]) : 0;
    const s = match[3] ? parseInt(match[3]) : 0;
    return h*3600 + m*60 + s;
}

function makeCard(video, isShort){
    const videoId = video.id.videoId || video.id;
    const title = video.snippet.title;
    const channel = video.snippet.channelTitle;
    const thumbs = video.snippet.thumbnails;
    const thumb = (thumbs.medium || thumbs.high || thumbs.default).url;

    const card = document.createElement("div");
    card.className = "card" + (isShort ? " short" : "");
    card.innerHTML = `
        <div class="thumb-wrap">
            ${isShort ? '<span class="badge">SHORTS</span>' : ''}
            <img src="${thumb}" loading="lazy">
            <div class="play-overlay">${PLAY_ICON}</div>
        </div>
        <div class="info">
            <div class="title">${title}</div>
            <div class="channel">${channel}</div>
        </div>
    `;
    card.onclick = () => playVideo(videoId);
    return card;
}

async function loadHomepage(){
    const trendingEl = document.getElementById("trending-results");
    const shortsEl = document.getElementById("shorts-results");
    try{
        const url = `https://www.googleapis.com/youtube/v3/videos?part=snippet,contentDetails&chart=mostPopular&maxResults=50&regionCode=${REGION_CODE}&key=${API_KEY}`;
        const res = await fetch(url);
        const data = await res.json();
        if(!res.ok) throw new Error(data.error.message);

        const items = data.items || [];
        const longVideos = [];
        const shortVideos = [];

        items.forEach(item => {
            const seconds = parseDurationToSeconds(item.contentDetails.duration);
            const normalized = { id: item.id, snippet: item.snippet };
            if(seconds <= 60){
                shortVideos.push(normalized);
            }else{
                longVideos.push(normalized);
            }
        });

        renderGrid(trendingEl, longVideos.slice(0, 12), false, "No trending videos found.");

        if(shortVideos.length >= 6){
            renderGrid(shortsEl, shortVideos.slice(0, 12), true, "No trending shorts found.");
        }else{
            // Fallback: YouTube has no dedicated "trending shorts" chart, so
            // approximate it with the most-viewed short-form videos right now.
            const shortsUrl = `https://www.googleapis.com/youtube/v3/search?part=snippet&type=video&videoDuration=short&order=viewCount&maxResults=12&regionCode=${REGION_CODE}&q=shorts&key=${API_KEY}`;
            const sRes = await fetch(shortsUrl);
            const sData = await sRes.json();
            if(sRes.ok){
                renderGrid(shortsEl, sData.items || [], true, "No trending shorts found.");
            }else{
                renderGrid(shortsEl, shortVideos.slice(0, 12), true, "No trending shorts found.");
            }
        }
    }catch(error){
        console.error(error);
        trendingEl.innerHTML = `<p class="state-msg" style="color:var(--coral)">${error.message}</p>`;
        shortsEl.innerHTML = "";
    }
}

function renderGrid(container, videos, isShort, emptyMsg){
    container.innerHTML = "";
    if(!videos || videos.length === 0){
        container.innerHTML = `<div class="state-msg">${emptyMsg}</div>`;
        return;
    }
    videos.forEach(video => container.appendChild(makeCard(video, isShort)));
}

async function searchVideos(){
    const query = document.getElementById("query").value.trim();
    if(query === ""){
        alert("Enter a search term");
        return;
    }
    document.getElementById("home-section").style.display = "none";
    const searchSection = document.getElementById("search-section");
    searchSection.style.display = "block";
    const results = document.getElementById("results");
    results.innerHTML = "<div class='state-msg'>Searching...</div>";

    const url = `https://www.googleapis.com/youtube/v3/search?part=snippet&type=video&maxResults=16&q=${encodeURIComponent(query)}&key=${API_KEY}`;
    try{
        const response = await fetch(url);
        const data = await response.json();
        if(!response.ok) throw new Error(data.error.message);
        renderGrid(results, data.items, false, "No videos found.");
    }catch(error){
        console.error(error);
        results.innerHTML = `<p class="state-msg" style="color:var(--coral)">${error.message}</p>`;
    }
}

function goHome(){
    document.getElementById("query").value = "";
    document.getElementById("search-section").style.display = "none";
    document.getElementById("home-section").style.display = "block";
    window.scrollTo({ top: 0, behavior: "smooth" });
}

function playVideo(videoId){
    document.getElementById("player").src = `https://www.youtube.com/embed/${videoId}?autoplay=1`;
    document.getElementById("player-container").style.display = "block";
    window.scrollTo({ top: 0, behavior: "smooth" });
}

loadHomepage();
</script>
</body>
</html>
